version: "3.9"

services:
  core:
    build: 
      context: "."
      dockerfile: core/Dockerfile
    container_name: core
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - backend

  celery_worker:
    build: 
      context: "."
      dockerfile: core/Dockerfile
    container_name: celery_worker
    command: celery -A core.celery_app:celery worker --loglevel=info -E
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - backend

  celery_beat:
    build: 
      context: "."
      dockerfile: core/Dockerfile
    container_name: celery_beat
    command: celery -A core.celery_app:celery beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - backend

  tg_bot:
    build:
      context: ./tg_bot
    container_name: telegram_bot
    command: python bot.py
    env_file:
      - .env
    depends_on:
      - core
    networks:
      - backend

  # miniapp:
  #   build:
  #     context: ./miniapp
  #   container_name: miniapp
  #   ports:
  #     - "8000:8000"
  #   restart: always

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - backend

  postgres:
    image: postgres:16
    container_name: postgres_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${PGADMIN_PORT}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - backend

volumes:
  postgres_data:
  pgadmin_data:

networks:
  backend: